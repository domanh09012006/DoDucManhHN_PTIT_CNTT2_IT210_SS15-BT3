<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Lịch sử đơn hàng</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
        <style>
            .sort-link { text-decoration: none; color: inherit; }
            .page-item.active .page-link { background-color: #0d6efd; border-color: #0d6efd; }
        </style>
    </head>
    <body class="bg-light">

        <div class="container py-5">
            <h2 class="mb-4"><i class="bi bi-clock-history"></i> Lịch sử đơn hàng của bạn</h2>

            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <form th:action="@{/orders}" method="get" class="row g-3 align-items-center">
                        <div class="col-auto">
                            <label class="form-label fw-bold">Trạng thái:</label>
                        </div>
                        <div class="col-auto">
                            <select name="status" class="form-select" onchange="this.form.submit()">
                                <option value="ALL" th:selected="${statusFilter == 'ALL' || statusFilter == null}">Tất cả đơn hàng</option>
                                <option value="PROCESSING" th:selected="${statusFilter == 'PROCESSING'}">Đang xử lý</option>
                                <option value="SHIPPING" th:selected="${statusFilter == 'SHIPPING'}">Đang giao</option>
                                <option value="DELIVERED" th:selected="${statusFilter == 'DELIVERED'}">Đã giao thành công</option>
                                <option value="CANCELLED" th:selected="${statusFilter == 'CANCELLED'}">Đã hủy</option>
                            </select>
                        </div>
                        <input type="hidden" name="sortBy" th:value="${param.sortBy}">
                        <input type="hidden" name="direction" th:value="${param.direction}">
                    </form>
                </div>
            </div>

            <div class="table-responsive bg-white rounded shadow-sm">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>Mã đơn</th>
                            <th>
                                <a class="sort-link" th:href="@{/orders(status=${statusFilter}, sortBy='createdDate', direction=${param.direction == null || param.direction[0] == 'asc' ? 'desc' : 'asc'})}">
                                    Ngày đặt đơn
                                    <i th:class="${param.sortBy != null && param.sortBy[0] == 'createdDate' ? (param.direction[0] == 'asc' ? 'bi bi-sort-up' : 'bi bi-sort-down') : 'bi bi-arrow-down-up'}"></i>
                                </a>
                            </th>
                            <th>Trạng thái</th>
                            <th>
                                <a class="sort-link" th:href="@{/orders(status=${statusFilter}, sortBy='totalAmount', direction=${param.direction == null || param.direction[0] == 'asc' ? 'desc' : 'asc'})}">
                                    Tổng tiền
                                    <i th:class="${param.sortBy != null && param.sortBy[0] == 'totalAmount' ? (param.direction[0] == 'asc' ? 'bi bi-sort-up' : 'bi bi-sort-down') : 'bi bi-arrow-down-up'}"></i>
                                </a>
                            </th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orderPage.content}">
                            <td th:text="${'#ORD-' + order.id}" class="fw-bold"></td>
                            <td th:text="${#temporals.format(order.createdDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span th:if="${order.status == 'DELIVERED'}" class="badge bg-success">Đã giao</span>
                                <span th:if="${order.status == 'PROCESSING'}" class="badge bg-warning text-dark">Đang xử lý</span>
                                <span th:if="${order.status == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
                                <span th:if="${order.status == 'SHIPPING'}" class="badge bg-info text-dark">Đang giao</span>
                            </td>
                            <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}" class="text-primary fw-bold"></td>
                            <td>
                                <a href="#" class="btn btn-sm btn-outline-secondary">Xem chi tiết</a>
                            </td>
                        </tr>
                        <tr th:if="${orderPage.totalElements == 0}">
                            <td colspan="5" class="text-center py-4 text-muted">Không tìm thấy đơn hàng nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${totalPages > 0}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/orders(page=0, status=${statusFilter}, sortBy=${param.sortBy}, direction=${param.direction})}">&laquo;</a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link" th:href="@{/orders(page=${i}, status=${statusFilter}, sortBy=${param.sortBy}, direction=${param.direction})}" th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/orders(page=${totalPages - 1}, status=${statusFilter}, sortBy=${param.sortBy}, direction=${param.direction})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
    </body>
</html>
